<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial" role="img" aria-label="The CIA triad: confidentiality, integrity, availability">
  <rect width="640" height="420" fill="#ffffff"/>
  <text x="320" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#4F46E5">Protecting Patient Information</text>
  <polygon points="320,78 540,368 100,368" fill="#EEF2FF" stroke="#818CF8" stroke-width="3" stroke-linejoin="round"/>
  <g transform="translate(320,232)">
    <circle r="34" fill="#4F46E5"/>
    <path d="M-11,-4 v-6 a11,11 0 0 1 22,0 v6 M-15,-4 h30 v20 h-30 z" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <g text-anchor="middle">
    <g transform="translate(320,60)">
      <text font-size="15" font-weight="800" fill="#1E293B">CONFIDENTIALITY</text>
      <text y="18" font-size="11.5" fill="#475569">only the right people can see it</text>
    </g>
    <g transform="translate(470,392)">
      <text font-size="15" font-weight="800" fill="#1E293B">AVAILABILITY</text>
      <text y="17" font-size="11.5" fill="#475569">there when care needs it</text>
    </g>
    <g transform="translate(170,392)">
      <text font-size="15" font-weight="800" fill="#1E293B">INTEGRITY</text>
      <text y="17" font-size="11.5" fill="#475569">accurate &amp; unaltered</text>
    </g>
  </g>
</svg>
